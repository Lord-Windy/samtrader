---
- name: Create backup directory
  file:
    path: "{{ samtrader_backup_dir }}"
    state: directory
    owner: samtrader
    group: samtrader
    mode: '0750'

- name: Deploy backup script
  copy:
    dest: /usr/local/bin/samtrader-backup.sh
    content: |
      #!/bin/bash
      set -euo pipefail

      BACKUP_DIR="${SAMTRADER_BACKUP_DIR:-{{ samtrader_backup_dir }}}"
      TIMESTAMP=$(date +%Y%m%d-%H%M%S)
      BACKUP_FILE="${BACKUP_DIR}/samtrader-${TIMESTAMP}.dump"

      mkdir -p "${BACKUP_DIR}"

      export PGHOST="${SAMTRADER_PG_HOST:-127.0.0.1}"
      export PGPORT="${SAMTRADER_PG_PORT:-5432}"
      export PGUSER="${SAMTRADER_PG_USER:-{{ samtrader_pg_user }}}"
      export PGPASSWORD="${SAMTRADER_PG_PASSWORD:-{{ samtrader_pg_password }}}"
      export PGDATABASE="${SAMTRADER_PG_DATABASE:-{{ samtrader_pg_database }}}"

      if ! pg_dump -Fc -f "${BACKUP_FILE}"; then
        rm -f "${BACKUP_FILE}"
        echo "ERROR: Backup failed" >&2
        exit 1
      fi

      chmod 640 "${BACKUP_FILE}"
      unset PGPASSWORD

      echo "Backup created: ${BACKUP_FILE}"
    owner: root
    group: root
    mode: '0755'

- name: Deploy backup rotation script
  copy:
    dest: /usr/local/bin/samtrader-rotate-backups.sh
    content: |
      #!/bin/bash
      set -euo pipefail

      BACKUP_DIR="${SAMTRADER_BACKUP_DIR:-{{ samtrader_backup_dir }}}"

      RETENTION_DAILY={{ samtrader_backup_retention_daily }}
      RETENTION_WEEKLY={{ samtrader_backup_retention_weekly }}
      RETENTION_MONTHLY={{ samtrader_backup_retention_monthly }}

      KEEP_LIST=$(mktemp)
      trap 'rm -f "${KEEP_LIST}"' EXIT

      find "${BACKUP_DIR}" -name "samtrader-*.dump" -type f -mtime -${RETENTION_DAILY} >> "${KEEP_LIST}"

      for i in $(seq 1 ${RETENTION_WEEKLY}); do
        days_ago=$(( i * 7 ))
        days_ago_end=$(( days_ago + 7 ))
        find "${BACKUP_DIR}" -name "samtrader-*.dump" -type f \
          -mtime +${days_ago} -mtime -${days_ago_end} | sort -r | head -1 >> "${KEEP_LIST}"
      done

      for i in $(seq 1 ${RETENTION_MONTHLY}); do
        days_ago=$(( i * 30 ))
        days_ago_end=$(( days_ago + 30 ))
        find "${BACKUP_DIR}" -name "samtrader-*.dump" -type f \
          -mtime +${days_ago} -mtime -${days_ago_end} | sort -r | head -1 >> "${KEEP_LIST}"
      done

      find "${BACKUP_DIR}" -name "samtrader-*.dump" -type f | while read -r f; do
        if ! grep -qxF "${f}" "${KEEP_LIST}"; then
          rm -f "${f}"
          echo "Removed: ${f}"
        fi
      done

      echo "Backup rotation completed"
    owner: root
    group: root
    mode: '0755'

- name: Deploy cron configuration for backups
  copy:
    dest: /etc/cron.d/samtrader-backup
    content: |
      # /etc/cron.d/samtrader-backup
      0 3 * * * samtrader /usr/local/bin/samtrader-backup.sh
      5 3 * * * samtrader /usr/local/bin/samtrader-rotate-backups.sh
    owner: root
    group: root
    mode: '0644'
