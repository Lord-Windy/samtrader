---
- name: Create samtrader system user
  user:
    name: samtrader
    system: yes
    shell: /usr/sbin/nologin
    home: /var/lib/samtrader
    create_home: no

- name: Create samtrader directories
  file:
    path: "{{ item }}"
    state: directory
    owner: samtrader
    group: samtrader
    mode: '0750'
  loop:
    - /var/lib/samtrader
    - /etc/samtrader

- name: Copy samtrader binary
  copy:
    src: samtrader
    dest: /usr/local/bin/samtrader
    owner: root
    group: root
    mode: '0755'

- name: Deploy samtrader config
  template:
    src: config.ini.j2
    dest: /etc/samtrader/config.ini
    owner: samtrader
    group: samtrader
    mode: '0640'
  notify: Restart samtrader

- name: Deploy systemd unit file
  copy:
    dest: /etc/systemd/system/samtrader.service
    content: |
      [Unit]
      Description=Samtrader Web Server
      After=network.target

      [Service]
      Type=simple
      User=samtrader
      Group=samtrader
      WorkingDirectory=/var/lib/samtrader
      ExecStart=/usr/local/bin/samtrader serve -c /etc/samtrader/config.ini
      Restart=on-failure
      RestartSec=5

      NoNewPrivileges=yes
      ProtectSystem=strict
      ProtectHome=yes
      ReadWritePaths=/var/lib/samtrader /var/backups/samtrader
      PrivateTmp=yes
      ProtectKernelTunables=yes
      ProtectKernelModules=yes
      ProtectControlGroups=yes
      RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
      RestrictNamespaces=yes
      MemoryDenyWriteExecute=yes

      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd daemon
    - Restart samtrader

- name: Run database migration (SQLite)
  command: /usr/local/bin/samtrader migrate --sqlite {{ samtrader_db_path }}
  args:
    creates: "{{ samtrader_db_path }}"
  become_user: samtrader
  when: samtrader_db_backend == 'sqlite'

- name: Run database migration (PostgreSQL)
  command: /usr/local/bin/samtrader migrate --postgres "postgresql://{{ samtrader_pg_user }}:{{ samtrader_pg_password }}@127.0.0.1:5432/{{ samtrader_pg_database }}"
  become_user: samtrader
  when: samtrader_db_backend == 'postgres'
  no_log: yes
  changed_when: true

- name: Check if bulk import already completed
  stat:
    path: "{{ samtrader_import_marker_file }}"
  register: bulk_import_marker

- name: Download SQL dump from Dropbox
  get_url:
    url: "{{ samtrader_sql_dump_url }}"
    dest: "{{ samtrader_sql_dump_path }}"
    owner: samtrader
    group: samtrader
    mode: '0640'
  when:
    - samtrader_db_backend == 'postgres'
    - samtrader_sql_dump_url | length > 0
    - not bulk_import_marker.stat.exists
  register: sql_dump_download

- name: Import SQL dump into PostgreSQL
  command: >
    psql
    --host=127.0.0.1
    --port=5432
    --username={{ samtrader_pg_user }}
    --dbname={{ samtrader_pg_database }}
    --file={{ samtrader_sql_dump_path }}
  environment:
    PGPASSWORD: "{{ samtrader_pg_password }}"
  become_user: samtrader
  when:
    - samtrader_db_backend == 'postgres'
    - sql_dump_download is changed
  no_log: yes
  async: 3600
  poll: 30
  register: sql_import

- name: Create bulk import marker file
  file:
    path: "{{ samtrader_import_marker_file }}"
    state: touch
    owner: samtrader
    group: samtrader
    mode: '0640'
  when: sql_import is changed

- name: Remove SQL dump file after successful import
  file:
    path: "{{ samtrader_sql_dump_path }}"
    state: absent
  when: sql_import is changed

- name: Enable and start samtrader service
  systemd:
    name: samtrader
    state: started
    enabled: yes
